<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Transcripción en Directo | Cartagenaeste</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#0f172a;--s1:#1e293b;--s2:#334155;--bd:#475569;--ac:#22c55e;--acd:rgba(34,197,94,.15);--red:#ef4444;--amb:#f59e0b;--blu:#3b82f6;--tx:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--font:'DM Sans',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh}
.nav{background:rgba(15,23,42,.95);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}
.nav a{color:#86efac;text-decoration:none;font-size:.85rem;font-weight:600}
.nav h1{font-size:1rem;font-weight:700;flex:1}
.container{max-width:750px;margin:0 auto;padding:16px}

/* Control panel */
.ctrl{background:var(--s1);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;margin-bottom:12px}
.ctrl-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{border:none;border-radius:10px;padding:12px 20px;font-family:var(--font);font-weight:700;font-size:.88rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.btn:active{transform:scale(.96)}
.btn-rec{background:var(--ac);color:#fff;min-width:140px;justify-content:center}
.btn-rec.recording{background:var(--red);animation:pulse 1.5s infinite}
.btn-rec.paused{background:var(--amb)}
.btn-sec{background:rgba(255,255,255,.08);color:var(--tx);border:1px solid rgba(255,255,255,.12)}
.btn-sec:hover{background:rgba(255,255,255,.12)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}

.status{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:.8rem;color:var(--t2)}
.status .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-idle{background:var(--t3)}
.dot-rec{background:var(--red);animation:blink 1s infinite}
.dot-paused{background:var(--amb)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.timer{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--t2);margin-left:auto}

/* Settings */
.settings{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.settings select{padding:8px 12px;background:var(--s2);color:var(--tx);border:1px solid rgba(255,255,255,.12);border-radius:8px;font-family:var(--font);font-size:.82rem}

/* Transcript area */
.transcript-card{background:var(--s1);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:0;overflow:hidden;margin-bottom:12px}
.transcript-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02)}
.transcript-header h2{font-size:.9rem;flex:1}
.transcript-header .count{font-size:.75rem;color:var(--t3);background:rgba(255,255,255,.06);padding:3px 10px;border-radius:20px}
.transcript{padding:16px;min-height:300px;max-height:60vh;overflow-y:auto;scroll-behavior:smooth}
.transcript:empty::before{content:'La transcripción aparecerá aquí cuando empieces a grabar...';color:var(--t3);font-style:italic;font-size:.88rem}

.t-entry{margin-bottom:12px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;border-left:3px solid var(--blu);position:relative}
.t-entry .t-time{font-size:.68rem;color:var(--t3);margin-bottom:4px;font-family:monospace}
.t-entry .t-text{font-size:.9rem;line-height:1.65;color:var(--tx)}
.t-entry.t-interim{border-left-color:var(--amb);opacity:.7}
.t-entry.t-interim .t-text{color:var(--t2);font-style:italic}

/* Actions bar */
.actions{background:var(--s1);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px 16px;display:flex;gap:8px;flex-wrap:wrap}

/* Quick notes */
.quick-notes{margin-top:12px}
.quick-notes h3{font-size:.82rem;color:var(--t2);margin-bottom:8px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:6px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;font-size:.78rem;cursor:pointer;transition:.15s;color:var(--t2)}
.chip:hover{background:var(--acd);border-color:var(--ac);color:var(--ac)}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#22c55e;color:#fff;padding:10px 20px;border-radius:10px;font-weight:600;font-size:.85rem;transition:transform .3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Responsive */
@media(max-width:500px){
  .btn{padding:10px 14px;font-size:.82rem}
  .transcript{min-height:200px;max-height:50vh}
  .settings select{font-size:.78rem;padding:6px 8px}
}
</style>
</head>
<body>
<div class="nav">
<a href="index.html">← Inicio</a>
<h1>🎙️ Transcripción en Directo</h1>
</div>

<div class="container">
<!-- CONTROLS -->
<div class="ctrl">
<div class="ctrl-row">
  <button class="btn btn-rec" id="btnRec" onclick="toggleRec()">
    <span id="btnRecIcon">🎙️</span>
    <span id="btnRecText">Iniciar</span>
  </button>
  <button class="btn btn-sec" id="btnPause" onclick="togglePause()" disabled>⏸ Pausar</button>
  <button class="btn btn-sec" id="btnMark" onclick="addMarker()" disabled>📌 Marcar</button>
</div>
<div class="settings">
  <select id="lang">
    <option value="es-ES" selected>🇪🇸 Español</option>
    <option value="en-US">🇬🇧 English</option>
    <option value="fr-FR">🇫🇷 Français</option>
    <option value="ar-SA">🇸🇦 العربية</option>
    <option value="ro-RO">🇷🇴 Română</option>
    <option value="zh-CN">🇨🇳 中文</option>
  </select>
  <select id="mode">
    <option value="continuous" selected>Continuo (consulta)</option>
    <option value="single">Frase a frase</option>
  </select>
</div>
<div class="status">
  <div class="dot dot-idle" id="dot"></div>
  <span id="statusText">Listo para grabar</span>
  <span class="timer" id="timer">00:00</span>
</div>
</div>

<!-- TRANSCRIPT -->
<div class="transcript-card">
<div class="transcript-header">
  <h2>📝 Transcripción</h2>
  <span class="count" id="wordCount">0 palabras</span>
</div>
<div class="transcript" id="transcript"></div>
</div>

<!-- ACTIONS -->
<div class="actions">
<button class="btn btn-sec" onclick="copyAll()">📋 Copiar todo</button>
<button class="btn btn-sec" onclick="downloadTxt()">💾 Descargar .txt</button>
<button class="btn btn-sec" onclick="clearAll()">🗑️ Limpiar</button>
<button class="btn btn-sec" onclick="copyForOMI()">🏥 Copiar para OMI</button>
</div>

<!-- QUICK STAMPS -->
<div class="quick-notes">
<h3>Marcas rápidas (toca para insertar):</h3>
<div class="chips">
  <div class="chip" onclick="insertStamp('--- ANAMNESIS ---')">📋 Anamnesis</div>
  <div class="chip" onclick="insertStamp('--- EXPLORACIÓN FÍSICA ---')">🩺 Exploración</div>
  <div class="chip" onclick="insertStamp('--- JUICIO CLÍNICO ---')">💡 Juicio clínico</div>
  <div class="chip" onclick="insertStamp('--- PLAN ---')">📝 Plan</div>
  <div class="chip" onclick="insertStamp('--- PRUEBAS COMPLEMENTARIAS ---')">🔬 Pruebas</div>
  <div class="chip" onclick="insertStamp('--- TRATAMIENTO ---')">💊 Tratamiento</div>
  <div class="chip" onclick="insertStamp('--- DERIVACIÓN ---')">🔄 Derivación</div>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let recognition = null;
let isRecording = false;
let isPaused = false;
let entries = [];
let startTime = null;
let timerInterval = null;
let interimEntry = null;

// ── SPEECH RECOGNITION SETUP ──
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  document.getElementById('statusText').textContent = '❌ Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.';
  document.getElementById('btnRec').disabled = true;
}

function createRecognition() {
  const r = new SpeechRecognition();
  r.lang = document.getElementById('lang').value;
  r.continuous = document.getElementById('mode').value === 'continuous';
  r.interimResults = true;
  r.maxAlternatives = 1;

  r.onresult = (e) => {
    let interim = '';
    let final = '';

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        final += t;
      } else {
        interim += t;
      }
    }

    // Show interim
    if (interim) {
      showInterim(interim);
    }

    // Add final
    if (final) {
      removeInterim();
      addEntry(final.trim());
    }
  };

  r.onerror = (e) => {
    if (e.error === 'no-speech') return; // Ignore silence
    if (e.error === 'aborted') return;
    console.log('Speech error:', e.error);
    if (e.error === 'not-allowed') {
      toast('❌ Micrófono no permitido. Activa permisos.');
      stopRec();
    }
  };

  r.onend = () => {
    // Auto-restart if still recording (continuous mode)
    if (isRecording && !isPaused) {
      try {
        setTimeout(() => {
          if (isRecording && !isPaused) {
            recognition.start();
          }
        }, 100);
      } catch(e) {}
    }
  };

  return r;
}

// ── CONTROLS ──
function toggleRec() {
  if (isRecording) {
    stopRec();
  } else {
    startRec();
  }
}

function startRec() {
  recognition = createRecognition();
  try {
    recognition.start();
  } catch(e) {
    toast('❌ Error al iniciar micrófono');
    return;
  }
  isRecording = true;
  isPaused = false;
  startTime = startTime || Date.now();
  startTimer();
  updateUI();
  toast('🎙️ Grabando...');
}

function stopRec() {
  isRecording = false;
  isPaused = false;
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }
  removeInterim();
  stopTimer();
  updateUI();
  toast('⏹ Grabación detenida');
}

function togglePause() {
  if (!isRecording) return;
  isPaused = !isPaused;
  if (isPaused) {
    try { recognition.stop(); } catch(e) {}
    stopTimer();
    toast('⏸ Pausado');
  } else {
    try { recognition.start(); } catch(e) {}
    startTimer();
    toast('▶️ Reanudado');
  }
  updateUI();
}

// ── UI UPDATES ──
function updateUI() {
  const btn = document.getElementById('btnRec');
  const btnText = document.getElementById('btnRecText');
  const btnIcon = document.getElementById('btnRecIcon');
  const dot = document.getElementById('dot');
  const status = document.getElementById('statusText');
  const btnPause = document.getElementById('btnPause');
  const btnMark = document.getElementById('btnMark');

  if (isRecording && !isPaused) {
    btn.className = 'btn btn-rec recording';
    btnText.textContent = 'Detener';
    btnIcon.textContent = '⏹';
    dot.className = 'dot dot-rec';
    status.textContent = 'Escuchando...';
    btnPause.disabled = false;
    btnPause.innerHTML = '⏸ Pausar';
    btnMark.disabled = false;
  } else if (isRecording && isPaused) {
    btn.className = 'btn btn-rec paused';
    btnText.textContent = 'Detener';
    btnIcon.textContent = '⏹';
    dot.className = 'dot dot-paused';
    status.textContent = 'En pausa';
    btnPause.innerHTML = '▶️ Reanudar';
  } else {
    btn.className = 'btn btn-rec';
    btnText.textContent = 'Iniciar';
    btnIcon.textContent = '🎙️';
    dot.className = 'dot dot-idle';
    status.textContent = 'Listo para grabar';
    btnPause.disabled = true;
    btnPause.innerHTML = '⏸ Pausar';
    btnMark.disabled = true;
  }
}

// ── TIMER ──
function startTimer() {
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);
}
function stopTimer() {
  clearInterval(timerInterval);
}

// ── ENTRIES ──
function addEntry(text) {
  if (!text) return;
  const elapsed = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');

  const entry = { time: m + ':' + s, text: text, type: 'speech' };
  entries.push(entry);
  renderEntry(entry);
  updateWordCount();
  scrollToBottom();
}

function renderEntry(entry) {
  const div = document.createElement('div');
  div.className = 't-entry' + (entry.type === 'marker' ? '' : '');
  if (entry.type === 'marker') {
    div.style.borderLeftColor = '#f59e0b';
    div.style.background = 'rgba(245,158,11,.08)';
  }
  div.innerHTML = '<div class="t-time">' + entry.time + '</div><div class="t-text">' + escHtml(entry.text) + '</div>';
  document.getElementById('transcript').appendChild(div);
}

function showInterim(text) {
  removeInterim();
  const div = document.createElement('div');
  div.className = 't-entry t-interim';
  div.id = 'interim';
  div.innerHTML = '<div class="t-text">' + escHtml(text) + '...</div>';
  document.getElementById('transcript').appendChild(div);
  scrollToBottom();
}

function removeInterim() {
  const el = document.getElementById('interim');
  if (el) el.remove();
}

function addMarker() {
  const elapsed = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  const entry = { time: m + ':' + s, text: '📌 — Marca —', type: 'marker' };
  entries.push(entry);
  renderEntry(entry);
  scrollToBottom();
  toast('📌 Marca añadida');
}

function insertStamp(text) {
  const elapsed = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  const entry = { time: m + ':' + s, text: text, type: 'marker' };
  entries.push(entry);
  renderEntry(entry);
  scrollToBottom();
}

// ── ACTIONS ──
function copyAll() {
  const text = entries.map(e => '[' + e.time + '] ' + e.text).join('\n');
  navigator.clipboard.writeText(text).then(() => toast('📋 Copiado al portapapeles'));
}

function copyForOMI() {
  // Clean version without timestamps for pasting into clinical software
  const text = entries.filter(e => e.type === 'speech').map(e => e.text).join(' ');
  navigator.clipboard.writeText(text).then(() => toast('🏥 Texto limpio copiado para OMI'));
}

function downloadTxt() {
  const now = new Date();
  const date = now.toISOString().slice(0, 10);
  const time = now.toTimeString().slice(0, 5).replace(':', '');
  const text = 'TRANSCRIPCIÓN DE CONSULTA\nFecha: ' + now.toLocaleDateString('es-ES') + ' ' + now.toLocaleTimeString('es-ES') + '\n\n' +
    entries.map(e => '[' + e.time + '] ' + e.text).join('\n');
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'transcripcion_' + date + '_' + time + '.txt';
  a.click();
  toast('💾 Descargado');
}

function clearAll() {
  if (entries.length && !confirm('¿Borrar toda la transcripción?')) return;
  entries = [];
  document.getElementById('transcript').innerHTML = '';
  startTime = null;
  document.getElementById('timer').textContent = '00:00';
  updateWordCount();
  toast('🗑️ Limpiado');
}

// ── HELPERS ──
function scrollToBottom() {
  const el = document.getElementById('transcript');
  el.scrollTop = el.scrollHeight;
}

function updateWordCount() {
  const words = entries.filter(e => e.type === 'speech').map(e => e.text).join(' ').split(/\s+/).filter(w => w).length;
  document.getElementById('wordCount').textContent = words + ' palabras';
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Change language on the fly
document.getElementById('lang').addEventListener('change', () => {
  if (isRecording) {
    stopRec();
    setTimeout(startRec, 200);
  }
});
</script>
</body>
</html>
