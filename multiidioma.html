<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info Multilingüe | Área II Cartagena</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f7f8fa;min-height:100vh}
.nav{background:linear-gradient(135deg,#0a2e1a,#145a32);padding:14px 20px;color:#fff;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.nav h1{font-size:1rem}.nav a{color:#86efac;text-decoration:none;font-size:.85rem}
.container{max-width:700px;margin:0 auto;padding:16px}
.lang-bar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;padding:12px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.lang-btn{padding:8px 14px;border:2px solid #e0e0e0;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;background:#fff;transition:all .2s;font-family:inherit}
.lang-btn.active{border-color:#1a6b4a;background:#e8f5e9;color:#1a6b4a}
.section{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}
.section h2{font-size:1.1rem;color:#1a6b4a;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e8f5e9}
.section h3{font-size:.95rem;color:#333;margin:12px 0 6px}
.section p,.section li{font-size:.88rem;line-height:1.7;color:#444}
.section ul{padding-left:20px;margin:6px 0}
.emergency{background:#fef2f2;border:2px solid #ef5350;border-radius:12px;padding:16px;text-align:center;margin-bottom:14px}
.emergency .num{font-size:2rem;font-weight:900;color:#c62828}
.emergency p{color:#b71c1c;font-weight:600;font-size:.9rem}
.contact-card{display:flex;gap:10px;padding:12px;background:#f8f8f8;border-radius:8px;margin:8px 0;align-items:center}
.contact-card .icon{font-size:1.4rem;flex-shrink:0}
.contact-card .info{flex:1;font-size:.85rem}
.contact-card a{color:#1a6b4a;font-weight:600;text-decoration:none}
[dir="rtl"]{direction:rtl;text-align:right}
[dir="rtl"] ul{padding-right:20px;padding-left:0}
</style>
</head>
<body>
<div class="nav"><a href="javascript:history.back()">← Volver</a><h1>🌍 Información Multilingüe</h1></div>
<div class="container">
    <div class="lang-bar">
        <button class="lang-btn active" onclick="setLang('es',this)">🇪🇸 Español</button>
        <button class="lang-btn" onclick="setLang('ar',this)">🇸🇦 العربية</button>
        <button class="lang-btn" onclick="setLang('fr',this)">🇫🇷 Français</button>
        <button class="lang-btn" onclick="setLang('en',this)">🇬🇧 English</button>
        <button class="lang-btn" onclick="setLang('ro',this)">🇷🇴 Română</button>
        <button class="lang-btn" onclick="setLang('zh',this)">🇨🇳 中文</button>
        <button class="lang-btn" onclick="setLang('uk',this)">🇺🇦 Українська</button>
    </div>

    <div class="emergency">
        <div class="num" data-i18n="emergency_num">112</div>
        <p data-i18n="emergency_text">Emergencias — Llama si es urgente</p>
    </div>

    <div id="content"></div>
</div>

<script>
var i18n={
es:{dir:'ltr',emergency_num:'112',emergency_text:'Emergencias — Llama si es urgente',content:`

uk:{dir:'ltr',emergency_num:'112',emergency_text:'Невідкладна допомога — Телефонуйте у разі термінової ситуації',content:`

};

function setLang(lang,btn){
    document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    var d=i18n[lang];
    document.querySelector('[data-i18n="emergency_text"]').textContent=d.emergency_text;
    document.getElementById('content').innerHTML=d.content;
    document.getElementById('content').setAttribute('dir',d.dir);
}

// Init
setLang('es',document.querySelector('.lang-btn'));
</script>
</body>
</html>
