<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Urgencias Docencia | Cartagenaeste</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-container">
        
        <!-- Header -->
        <header class="top-header" id="topHeader">
            <div class="header-content" id="headerContent">
                <div class="search-box">
                    <span class="material-symbols-outlined search-icon">search</span>
                    <input type="text" placeholder="Search" />
                </div>
            </div>
            <!-- Sub tabs if inside detail -->
            <div id="detailTabs" class="detail-tabs hidden">
                <button class="tab active" data-tab="doses">Doses</button>
                <button class="tab" data-tab="equipment">Equipment</button>
            </div>
        </header>

        <!-- Home / Search Tabs -->
        <nav class="tabs-nav" id="homeTabs">
            <button class="tab active" data-tab="conditions">Conditions</button>
            <button class="tab" data-tab="procedures">Procedures</button>
            <button class="tab" data-tab="drugs">Drugs</button>
        </nav>

        <!-- Main Content Area -->
        <main class="content-body" id="mainContent">
            <!-- Dynamic Content goes here -->
        </main>

        <!-- Floating Action Area (Weight) -->
        <div class="floating-action-area">
            <div class="weight-button" id="weightBtn">
                <strong>Weight:</strong> <span id="weightValKg">80.0</span> kg <span class="lbs-text"><span id="weightValLbs">176.4</span> lbs</span>
            </div>
            <div class="ai-button" onclick="alert('El Asistente A.D.A.M.S. IA está en desarrollo.')">
                <span class="material-symbols-outlined">data_object</span>
            </div>
        </div>

        <!-- Bottom NavigationBar -->
        <footer class="bottom-nav">
            <button class="nav-btn" id="navBack"><span class="material-symbols-outlined">arrow_back_ios</span></button>
            <button class="nav-btn"><span class="material-symbols-outlined">star</span></button>
            <button class="nav-btn active" id="navHome"><span class="material-symbols-outlined">home</span></button>
            <button class="nav-btn"><span class="material-symbols-outlined">search</span></button>
            <button class="nav-btn" onclick="window.location.href=&apos;../index.html&apos;"><span class="material-symbols-outlined">logout</span></button>
        </footer>

        <!-- Weight Edit Modal -->
        <div id="weightModal" class="modal-overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h2>Patient Weight</h2>
                    <button class="close-btn" id="closeWeightModal"><span class="material-symbols-outlined">close</span></button>
                </div>
                <div class="modal-body">
                    <p class="text-sm">Change the global patient weight. All medication doses and equipment sizes will automatically recalculate.</p>
                    <div class="weight-input-group">
                        <input type="number" id="weightInput" value="80" step="0.5" min="1" max="250" />
                        <span>kg</span>
                    </div>
                    <button class="primary-btn" id="saveWeightBtn">Actualizar Dosis</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="./app.js"></script>
</body>
</html>
