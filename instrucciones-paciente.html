<!DOCTYPE html>
<html lang="es">
<head>
  <script src="/console-guard.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instrucciones médicas — Área II Cartagena</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,'Segoe UI',sans-serif;background:#f0fdf4;min-height:100vh}
.header{background:linear-gradient(135deg,#0a2e1a,#145a32);padding:18px 20px;color:#fff;text-align:center}
.header h1{font-size:1.1rem;font-weight:700}
.header p{font-size:.78rem;opacity:.7;margin-top:4px}
.card{max-width:500px;margin:20px auto;background:#fff;border-radius:14px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.titulo{font-size:1.15rem;font-weight:800;color:#145a32;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.fecha{font-size:.78rem;color:#888;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #e8f5e9}
.contenido{font-size:.95rem;line-height:1.8;color:#1a1a2e;white-space:pre-wrap}
.prof{margin-top:16px;padding-top:12px;border-top:2px solid #e8f5e9;font-size:.88rem;font-weight:600;color:#145a32}
.footer{text-align:center;padding:16px;font-size:.72rem;color:#888;max-width:500px;margin:0 auto}
.error{text-align:center;padding:60px 20px}
.error .icon{font-size:3rem;margin-bottom:12px}
</style>
</head>
<body>

<div class="header">
<h1>🏥 Área II Cartagena</h1>
<p>Centro de Salud Virgen de la Caridad</p>
</div>

<div id="content"></div>

<div class="footer">
⚠️ Estas instrucciones son orientativas. Ante cualquier duda, contacte con su centro de salud.<br>
Servicio Murciano de Salud · Área II Cartagena
</div>

<script>
try {
  var params = new URLSearchParams(window.location.search);
  var dataParam = params.get('data');
  
  if (!dataParam) throw new Error('No data');
  
  var decoded = JSON.parse(decodeURIComponent(escape(atob(dataParam))));
  
  var html = '<div class="card">';
  if (decoded.t) html += '<div class="titulo">' + escapeHtml(decoded.t) + '</div>';
  if (decoded.d) html += '<div class="fecha">📅 ' + escapeHtml(decoded.d) + '</div>';
  if (decoded.c) html += '<div class="contenido">' + escapeHtml(decoded.c) + '</div>';
  if (decoded.p) html += '<div class="prof">👨‍⚕️ ' + escapeHtml(decoded.p) + '</div>';
  html += '</div>';
  
  document.getElementById('content').innerHTML = html;
  
  if (decoded.t) document.title = decoded.t + ' — Área II Cartagena';
  
} catch(e) {
  document.getElementById('content').innerHTML = 
    '<div class="card"><div class="error"><div class="icon">❌</div>' +
    '<h2>Enlace no válido</h2><p style="color:#666;margin-top:8px;">Este QR no contiene instrucciones válidas o ha expirado.</p></div></div>';
}

function escapeHtml(t) {
  var d = document.createElement('div');
  d.textContent = t || '';
  return d.innerHTML;
}
</script>
</body>
</html>
