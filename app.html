<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0d3d26">
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="Redirección a panel-medico.html — consolidación de app.html">
<title>Redirigiendo…</title>

<!-- Preserve query + hash al redirigir a la página canónica (panel-medico.html) -->
<script>
(function(){
  try{
    var search = location.search || '';
    var hash = location.hash || '';
    // app.html?page=pageEnfermeria#foo  →  panel-medico.html?page=pageEnfermeria#foo
    location.replace('panel-medico.html' + search + hash);
  }catch(e){
    // Fallback si location.replace falla por algún motivo
    location.href = 'panel-medico.html';
  }
})();
</script>

<!-- Fallback meta refresh si JS está deshabilitado -->
<meta http-equiv="refresh" content="0; url=panel-medico.html">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d3d26;color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.wrap{max-width:520px}
h1{font-size:1.3rem;font-weight:700;margin-bottom:10px}
p{font-size:.95rem;opacity:.85;line-height:1.55;margin-bottom:18px}
a{color:#ffd54f;text-decoration:underline;font-weight:600}
.spinner{display:inline-block;width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <h1>🏥 Redirigiendo…</h1>
    <p>La página <code>app.html</code> se ha consolidado en <code>panel-medico.html</code>. Deberías ser redirigido automáticamente.</p>
    <p>Si no ocurre en 2 segundos, pulsa:<br><br>
      <a id="manualLink" href="panel-medico.html">Ir al panel de profesionales →</a>
    </p>
  </div>
  <script>
    // Actualiza el link manual preservando query + hash
    (function(){
      try{
        var a = document.getElementById('manualLink');
        if(a) a.href = 'panel-medico.html' + (location.search || '') + (location.hash || '');
      }catch(e){}
    })();
  </script>
</body>
</html>
