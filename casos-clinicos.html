<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casos Clínicos | Área II Cartagena</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.nav{background:rgba(15,23,42,.9);padding:14px 20px;color:#fff;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.1)}
.nav h1{font-size:1.05rem}.nav a{color:#86efac;text-decoration:none;font-size:.85rem}
.container{max-width:700px;margin:0 auto;padding:20px}
.score-bar{display:flex;gap:16px;justify-content:center;padding:14px;background:rgba(255,255,255,.05);border-radius:12px;margin-bottom:20px}
.score-item{text-align:center}.score-item .num{font-size:1.4rem;font-weight:800}.score-item .lbl{font-size:.7rem;color:#94a3b8}
.case-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:24px;margin-bottom:16px}
.case-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.case-header .badge{padding:4px 10px;border-radius:8px;font-size:.72rem;font-weight:700;text-transform:uppercase}
.badge-easy{background:#22c55e20;color:#22c55e}.badge-med{background:#f59e0b20;color:#f59e0b}.badge-hard{background:#ef444420;color:#ef4444}
.case-header h2{font-size:1.1rem;flex:1}
.case-body{font-size:.9rem;line-height:1.7;color:#cbd5e1;margin-bottom:16px}
.case-body strong{color:#e2e8f0}
.vitals{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin:12px 0;padding:12px;background:rgba(0,0,0,.2);border-radius:8px}
.vital{text-align:center;padding:6px}.vital .val{font-size:1.1rem;font-weight:800;color:#60a5fa}.vital .name{font-size:.68rem;color:#94a3b8}
.options{display:flex;flex-direction:column;gap:8px}
.option{padding:14px 16px;border:2px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer;transition:all .2s;font-size:.88rem;display:flex;align-items:center;gap:10px}
.option:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.05)}
.option .letter{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;flex-shrink:0}
.option.correct{border-color:#22c55e;background:#22c55e15}.option.correct .letter{background:#22c55e;color:#fff}
.option.wrong{border-color:#ef4444;background:#ef444415}.option.wrong .letter{background:#ef4444;color:#fff}
.option.disabled{cursor:default;opacity:.6}
.explanation{display:none;margin-top:14px;padding:14px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:10px;font-size:.85rem;line-height:1.6}
.explanation.show{display:block}
.btn-next{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;padding:13px;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;width:100%;margin-top:14px;font-family:inherit;display:none}
.btn-next.show{display:block}
.category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.cat-btn{padding:14px 10px;border:2px solid rgba(255,255,255,.1);border-radius:12px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.03)}
.cat-btn:hover{border-color:#22c55e;background:rgba(34,197,94,.1);transform:translateY(-2px)}
.cat-btn .ico{font-size:1.6rem;margin-bottom:4px}.cat-btn .lbl{font-size:.78rem;font-weight:600}
.finish{text-align:center;padding:40px;display:none}
.finish .trophy{font-size:4rem;margin-bottom:12px}
.progress{height:4px;background:rgba(255,255,255,.1);border-radius:4px;margin-bottom:20px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#22c55e,#60a5fa);border-radius:4px;transition:width .3s}
.vitals{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0;padding:10px;background:rgba(255,255,255,.03);border-radius:8px}
.vital{text-align:center;padding:6px 10px;background:rgba(96,165,250,.1);border-radius:6px;min-width:60px}
.vital .val{font-weight:800;font-size:.95rem;color:#60a5fa}.vital .name{font-size:.68rem;color:#94a3b8;text-transform:uppercase}
.options{display:flex;flex-direction:column;gap:8px}
</style>
</head>
<body>
<div class="nav"><a href="index.html">← Inicio</a><h1>🧠 Casos Clínicos MIR</h1></div>
<div class="container">
    <div class="score-bar">
        <div class="score-item"><div class="num" id="scoreCorrect" style="color:#22c55e;">0</div><div class="lbl">Aciertos</div></div>
        <div class="score-item"><div class="num" id="scoreWrong" style="color:#ef4444;">0</div><div class="lbl">Fallos</div></div>
        <div class="score-item"><div class="num" id="scoreTotal">0</div><div class="lbl">Total</div></div>
        <div class="score-item"><div class="num" id="scoreStreak" style="color:#f59e0b;">0</div><div class="lbl">Racha</div></div>
        <div class="score-item"><div class="num" id="scorePct" style="color:#60a5fa;">-</div><div class="lbl">%</div></div>
    </div>
    <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

    <!-- SETTINGS BAR -->
    <div id="settingsBar" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px;margin-bottom:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <span style="font-weight:700;font-size:.9rem;">⚙️ Configuración</span>
        <span id="totalQCount" style="font-size:.75rem;color:#94a3b8;"></span>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <div style="flex:1;min-width:140px;">
          <label style="font-size:.72rem;color:#94a3b8;display:block;margin-bottom:4px;">Nº preguntas</label>
          <select id="cfgCount" style="width:100%;padding:8px;background:#1e293b;color:#e2e8f0;border:1px solid rgba(255,255,255,.15);border-radius:8px;font-size:.85rem;">
            <option value="5">5 preguntas</option>
            <option value="10" selected>10 preguntas</option>
            <option value="15">15 preguntas</option>
            <option value="20">20 preguntas</option>
            <option value="0">Todas las disponibles</option>
          </select>
        </div>
        <div style="flex:1;min-width:140px;">
          <label style="font-size:.72rem;color:#94a3b8;display:block;margin-bottom:4px;">Dificultad</label>
          <select id="cfgDiff" style="width:100%;padding:8px;background:#1e293b;color:#e2e8f0;border:1px solid rgba(255,255,255,.15);border-radius:8px;font-size:.85rem;">
            <option value="all" selected>Todas</option>
            <option value="easy">🟢 Fácil</option>
            <option value="med">🟡 Media</option>
            <option value="hard">🔴 Difícil</option>
          </select>
        </div>
      </div>
    </div>

    <div id="categorySelect">
        <h2 style="text-align:center;margin-bottom:16px;font-size:1.1rem;">Selecciona especialidad</h2>
        <div class="category-grid">
            <div class="cat-btn" onclick="startCategory('cardio')"><div class="ico">❤️</div><div class="lbl">Cardiología</div><div style="font-size:.65rem;color:#64748b;" class="cat-count" data-cat="cardio"></div></div>
            <div class="cat-btn" onclick="startCategory('neumo')"><div class="ico">🫁</div><div class="lbl">Neumología</div><div style="font-size:.65rem;color:#64748b;" class="cat-count" data-cat="neumo"></div></div>
            <div class="cat-btn" onclick="startCategory('neuro')"><div class="ico">🧠</div><div class="lbl">Neurología</div><div style="font-size:.65rem;color:#64748b;" class="cat-count" data-cat="neuro"></div></div>
            <div class="cat-btn" onclick="startCategory('digest')"><div class="ico">🍽️</div><div class="lbl">Digestivo</div><div style="font-size:.65rem;color:#64748b;" class="cat-count" data-cat="digest"></div></div>
            <div class="cat-btn" onclick="startCategory('nefro')"><div class="ico">💧</div><div class="lbl">Nefrología</div><div style="font-size:.65rem;color:#64748b;" class="cat-count" data-cat="nefro"></div></div>
            <div class="cat-btn" onclick="startCategory('infec')"><div class="ico">🦠</div><div class="lbl">Infecciosas</div><div style="font-size:.65rem;color:#64748b;" class="cat-count" data-cat="infec"></div></div>
            <div class="cat-btn" onclick="startCategory('endo')"><div class="ico">🧬</div><div class="lbl">Endocrino</div><div style="font-size:.65rem;color:#64748b;" class="cat-count" data-cat="endo"></div></div>
            <div class="cat-btn" onclick="startCategory('all')" style="border-color:rgba(34,197,94,.3);"><div class="ico">🎲</div><div class="lbl">Aleatorio</div><div style="font-size:.65rem;color:#64748b;" class="cat-count" data-cat="all"></div></div>
        </div>
    </div>


    <div id="caseArea" style="display:none;"></div>

    <div class="finish" id="finishScreen">
        <div class="trophy">🏆</div>
        <h2 style="color:#22c55e;margin-bottom:8px;">¡Sesión completada!</h2>
        <p style="color:#94a3b8;margin-bottom:16px;" id="finishMsg"></p>
        <button class="btn-next show" onclick="resetGame()" style="max-width:300px;margin:0 auto;">🔄 Nueva sesión</button>
    </div>
</div>

<script>
// MIR QUESTION BANK - ~15 per category
var cases=[
// ═══ CARDIOLOGÍA (15) ═══
{cat:'cardio',diff:'easy',title:'SCA con elevación ST',body:'Varón 62a, HTA, DM2, fumador. Dolor opresivo retroesternal 2h, irradiado a brazo izquierdo, sudoración.',question:'¿Primera medida?',options:['ECG en <10 min','Rx tórax urgente','Analítica con troponinas','Ecocardiograma'],correct:0,explain:'ECG en <10 min ante sospecha SCA. Si ST elevado → Código Infarto.'},
{cat:'cardio',diff:'med',title:'FA rápida',body:'Mujer 78a con FA conocida, Digoxina 0.25mg/día. FC 145 lpm irregular, estable.',question:'¿Fármaco para control de frecuencia?',options:['Amiodarona IV','Diltiazem IV','Flecainida IV','Cardioversión eléctrica'],correct:1,explain:'Paciente estable con FA: calcioantagonistas (Diltiazem) o betabloqueantes para control frecuencia. Flecainida CI en cardiopatía estructural.'},
{cat:'cardio',diff:'hard',title:'Shock cardiogénico post-IAM',body:'Varón 70a, IAM anterior extenso hace 3h. TAS 75mmHg, FC 115, crepitantes bilaterales, oliguria.',question:'¿Tratamiento inicial?',options:['Furosemida 80mg IV','Noradrenalina + Dobutamina','Nitroglicerina IV','Balón de contrapulsación'],correct:1,explain:'Shock cardiogénico: inotrópico (Dobutamina) + vasopresor (Noradrenalina) si TAS<90. Revascularización urgente. Furosemida solo si congestión sin hipotensión.'},
{cat:'cardio',diff:'easy',title:'HTA en urgencias',body:'Mujer 55a acude con cefalea y TA 195/110. Sin focalidad, sin dolor torácico, sin disnea. Fondo de ojo normal.',question:'¿Actitud?',options:['Captopril 25mg VO y observar','Nitroprusiato IV urgente','Labetalol IV','TC craneal urgente'],correct:0,explain:'Urgencia hipertensiva (sin daño órgano diana): tratamiento oral. Captopril 25mg VO, reevaluar en 45-60 min. Emergencia HTA (con DOD) requeriría IV.'},
{cat:'cardio',diff:'med',title:'Taponamiento cardíaco',body:'Varón 45a post-cirugía cardíaca. Hipotensión, ingurgitación yugular, tonos cardíacos apagados (tríada de Beck).',question:'¿Diagnóstico y tratamiento urgente?',options:['Taponamiento → pericardiocentesis','IAM → fibrinolisis','TEP → anticoagulación','Neumotórax a tensión → drenaje'],correct:0,explain:'Tríada de Beck: hipotensión + ingurgitación yugular + tonos apagados = taponamiento cardíaco. Tratamiento: pericardiocentesis urgente guiada por eco.'},
{cat:'cardio',diff:'hard',title:'Taquicardia de complejo ancho',body:'Varón 68a, IAM previo. Palpitaciones, mareo, TA 95/60. ECG: taquicardia regular QRS ancho 160lpm.',question:'¿Diagnóstico más probable?',options:['Taquicardia ventricular','TSV con conducción aberrante','FA preexcitada','Flutter con bloqueo'],correct:0,explain:'Taquicardia QRS ancho en paciente con cardiopatía estructural = TV hasta que se demuestre lo contrario. Si inestable: cardioversión eléctrica. Si estable: Amiodarona IV.'},
{cat:'cardio',diff:'easy',title:'ICC descompensada',body:'Mujer 75a, miocardiopatía dilatada conocida. Disnea progresiva, ortopnea, edemas maleolares bilaterales.',question:'¿Tratamiento inicial?',options:['Furosemida IV + O2','Dobutamina IV','Digoxina IV','Amiodarona IV'],correct:0,explain:'ICC descompensada con congestión: Furosemida IV (diurético de asa) + oxigenoterapia + posición semisentada. Valorar VMNI si insuficiencia respiratoria.'},
{cat:'cardio',diff:'med',title:'Endocarditis',body:'Varón 35a, ADVP. Fiebre 39°C, soplo regurgitante nuevo, petequias, nódulos de Osler.',question:'¿Prueba diagnóstica clave?',options:['Hemocultivos seriados (3 sets)','Ecocardiograma transtorácico','PCR y procalcitonina','Rx tórax'],correct:0,explain:'Criterios de Duke: hemocultivos positivos son criterio mayor. Se extraen 3 sets de hemocultivos de sitios diferentes antes de iniciar ATB. Eco complementa pero los hemocultivos son prioritarios.'},
{cat:'cardio',diff:'hard',title:'Disección aórtica',body:'Varón 65a, HTA mal controlada. Dolor torácico desgarrador irradiado a espalda, asimetría de pulsos, TA 200/120 brazo derecho.',question:'¿Primera medida farmacológica?',options:['Labetalol IV (bajar FC y TA)','Morfina + NTG','Heparina IV','Fibrinolisis'],correct:0,explain:'Disección aórtica: reducir fuerza de cizallamiento. 1º betabloqueante IV (Labetalol) para FC<60 y TAS<120. La heparina y fibrinolisis están CONTRAINDICADAS. Tipo A: cirugía urgente.'},
{cat:'cardio',diff:'easy',title:'Bloqueo AV completo',body:'Mujer 80a, mareos y síncopes. ECG: disociación AV completa, FC ventricular 35 lpm.',question:'¿Tratamiento definitivo?',options:['Marcapasos definitivo','Atropina indefinida','Isoproterenol','Observación'],correct:0,explain:'BAV completo sintomático: indicación de marcapasos definitivo. Atropina/Isoproterenol son medidas temporales mientras se coloca el MCP.'},
{cat:'cardio',diff:'med',title:'CHA2DS2-VASc en FA',body:'Varón 72a con FA permanente, HTA, DM2. No antecedentes de ictus. Sin cardiopatía isquémica.',question:'CHA2DS2-VASc = 3. ¿Actitud?',options:['Anticoagulación oral (ACOD o Sintrom)','AAS 100mg/día','Doble antiagregación','No precisa tratamiento'],correct:0,explain:'CHA2DS2-VASc ≥2 en varón: anticoagulación oral indicada. ACOD preferible sobre AVK excepto en estenosis mitral moderada-severa o prótesis mecánica.'},
{cat:'cardio',diff:'hard',title:'Síndrome de Brugada',body:'Varón 35a, síncope durante el sueño. AF de muerte súbita (hermano 30a). ECG: elevación ST cóncava V1-V3 tipo 1.',question:'¿Tratamiento?',options:['DAI (desfibrilador implantable)','Betabloqueantes','Amiodarona crónica','Marcapasos'],correct:0,explain:'Brugada tipo 1 + síntomas (síncope/muerte súbita recuperada): indicación de DAI. Los antiarrítmicos NO previenen muerte súbita en Brugada. La Quinidina es el único fármaco con cierta evidencia como puente.'},
{cat:'cardio',diff:'easy',title:'Pericarditis aguda',body:'Varón 28a, dolor torácico que mejora sentado e inclinado hacia delante, empeora con inspiración. Fiebre. ECG: elevación ST difusa.',question:'¿Tratamiento?',options:['AAS/Ibuprofeno + Colchicina','Anticoagulación','Corticoides de entrada','Antibióticos IV'],correct:0,explain:'Pericarditis aguda viral/idiopática: AINE (Ibuprofeno 600mg/8h o AAS) + Colchicina 0.5mg/12h. La Colchicina reduce recurrencias. Corticoides solo si CI AINEs.'},
{cat:'cardio',diff:'med',title:'Estenosis aórtica severa',body:'Varón 78a, disnea de esfuerzo progresiva, síncope con el ejercicio. Soplo sistólico eyectivo irradiado a carótidas.',question:'¿Cuándo está indicada la cirugía?',options:['Estenosis severa sintomática','Estenosis severa asintomática con FEVI normal','Solo si gradiente >80mmHg','Nunca si >75 años'],correct:0,explain:'La estenosis aórtica severa sintomática (disnea, síncope, angina) tiene indicación quirúrgica (recambio valvular o TAVI). Sin cirugía, supervivencia <2-3 años. La edad avanzada no es contraindicación (TAVI).'},
{cat:'cardio',diff:'hard',title:'TEP masivo',body:'Mujer 60a postoperada cadera. Disnea brusca, hipotensión TAS 70, taquicardia 130, ingurgitación yugular.',question:'¿Tratamiento?',options:['Fibrinolisis sistémica (alteplasa)','HBPM a dosis terapéuticas','Filtro de vena cava','Embolectomía quirúrgica'],correct:0,explain:'TEP masivo con inestabilidad hemodinámica: fibrinolisis sistémica (alteplasa 100mg/2h). Es la única indicación clara de fibrinolisis en TEP. Si CI fibrinolisis: embolectomía quirúrgica o intervencionismo.'},

// ═══ NEUMOLOGÍA (15) ═══
{cat:'neumo',diff:'easy',title:'NAC bajo riesgo',body:'Varón 45a sano. Fiebre 38.8°C, tos productiva 5d, dolor pleurítico. Rx: condensación LID. CURB-65=0.',question:'¿Tratamiento?',options:['Amoxicilina 1g/8h VO 7d','Levofloxacino 500mg/24h','Ceftriaxona 2g IV + Azitromicina','Ingreso + hemocultivos'],correct:0,explain:'NAC CURB-65=0: bajo riesgo, ambulatorio. 1ª línea: Amoxicilina 1g/8h 5-7d. Alérgicos: Azitromicina o Doxiciclina.'},
{cat:'neumo',diff:'hard',title:'EPOC agudizado grave',body:'Varón 72a, EPOC GOLD IV, O2 domiciliario. Disnea, esputo purulento, uso musculatura accesoria. pH 7.28, pCO2 65.',question:'¿Primera medida?',options:['ATB IV urgente','VMNI (BiPAP)','IOT y VM','Corticoides IV'],correct:1,explain:'EPOC agudizado con acidosis respiratoria: VMNI (BiPAP) reduce IOT y mortalidad. Simultáneamente: nebulizados + corticoides + ATB si Anthonisen.'},
{cat:'neumo',diff:'med',title:'Derrame pleural',body:'Mujer 65a, disnea progresiva. Rx: derrame pleural derecho masivo. Toracocentesis: exudado, pH 7.15, glucosa 30, LDH 1200.',question:'¿Diagnóstico más probable?',options:['Empiema','Trasudado por ICC','Derrame paraneumónico no complicado','Quilotórax'],correct:0,explain:'Exudado + pH<7.2 + glucosa<40 + LDH>1000 = derrame complicado/empiema. Requiere drenaje torácico. Los criterios de Light diferencian exudado de trasudado.'},
{cat:'neumo',diff:'easy',title:'Neumotórax espontáneo',body:'Varón 22a, alto, delgado. Dolor torácico brusco + disnea. Rx: neumotórax derecho 30%.',question:'¿Tratamiento?',options:['Drenaje torácico con tubo','Aspiración con aguja fina','Observación + O2','Cirugía urgente (VATS)'],correct:0,explain:'Neumotórax espontáneo primario >20-30% o sintomático: drenaje. Algunos protocolos aceptan aspiración simple como primera línea. Si <15% y asintomático: observación con O2.'},
{cat:'neumo',diff:'med',title:'Crisis asmática',body:'Mujer 30a asmática. Disnea severa, sibilantes, FR 30, no puede completar frases. SatO2 89%. PEF 40%.',question:'¿Tratamiento inmediato?',options:['Salbutamol nebulizado + Ipratropio + Corticoides IV','Salbutamol inhalado 2 puffs','Teofilina IV','Adrenalina IM'],correct:0,explain:'Crisis asmática grave: Salbutamol nebulizado continuo + Ipratropio + Corticoides sistémicos (Metilprednisolona IV). Si no responde: Sulfato de Magnesio IV. Adrenalina solo si anafilaxia.'},
{cat:'neumo',diff:'hard',title:'SDRA',body:'Mujer 45a, neumonía bilateral. PaO2/FiO2=120, infiltrados bilaterales en Rx, no ICC. Ventilación mecánica.',question:'¿Estrategia ventilatoria?',options:['Vt bajo (6ml/kg peso ideal) + PEEP alta','Vt alto (12ml/kg) para mejorar oxigenación','Ventilación no invasiva','Presión soporte sola'],correct:0,explain:'SDRA: ventilación protectora con Vt bajo (6ml/kg peso ideal) + PEEP óptima + Pplateau <30cmH2O. Prone si PaO2/FiO2<150. Reduce mortalidad (estudio ARDSNet).'},
{cat:'neumo',diff:'easy',title:'Tromboembolismo pulmonar',body:'Mujer 45a, ACO, inmovilización 2 semanas. Disnea súbita, dolor pleurítico, taquicardia. Wells 7 puntos.',question:'¿Siguiente paso diagnóstico?',options:['AngioTC pulmonar','Dímero D','Gammagrafía V/Q','Ecocardiograma'],correct:0,explain:'Wells >6 (alta probabilidad): AngioTC directamente, sin Dímero D previo. El Dímero D solo es útil si probabilidad baja-intermedia (para excluir). Iniciar HBPM mientras se confirma.'},
{cat:'neumo',diff:'med',title:'Fibrosis pulmonar idiopática',body:'Varón 65a, disnea progresiva 2 años, tos seca. Crepitantes tipo velcro en bases. TC: patrón UIP (panalización, bronquiectasias tracción).',question:'¿Tratamiento indicado?',options:['Pirfenidona o Nintedanib','Corticoides a dosis altas','Ciclofosfamida','No hay tratamiento eficaz, solo paliativo'],correct:0,explain:'FPI con patrón UIP: antifibróticos (Pirfenidona o Nintedanib) enlentecen progresión. Los corticoides NO están indicados y pueden empeorar. Derivar a unidad de trasplante si progresa.'},
{cat:'neumo',diff:'easy',title:'Oxigenoterapia en EPOC',body:'Varón 70a EPOC, gasometría estable: PaO2 52mmHg, PaCO2 50mmHg, pH 7.38.',question:'¿Indicación de O2 domiciliario crónico?',options:['Sí, PaO2 <55mmHg en estabilidad','Solo si PaO2 <45mmHg','No, esperar a agudización','Solo nocturno'],correct:0,explain:'OCD indicada si PaO2 <55mmHg en estabilidad (o <60 con cor pulmonale/poliglobulia). Objetivo: PaO2 >60 sin retención CO2. Mejora supervivencia si >15h/día.'},
{cat:'neumo',diff:'hard',title:'Hemoptisis masiva',body:'Varón 58a, exfumador, EPOC. Hemoptisis de 300ml en 1h. Inestabilidad hemodinámica.',question:'¿Medida más urgente?',options:['Decúbito lateral sobre lado sangrante + IOT','Broncoscopia urgente','Arteriografía bronquial','TC torácico'],correct:0,explain:'Hemoptisis masiva (>200-300ml/24h): proteger vía aérea. Decúbito lateral con pulmón sangrante abajo para proteger el sano. IOT con tubo de doble luz si precisa. Después: arteriografía con embolización.'},
{cat:'neumo',diff:'med',title:'Derrame pleural trasudado',body:'Mujer 70a, ICC conocida. Derrame pleural bilateral. Toracocentesis: proteínas 2g/dL, LDH 100.',question:'¿Es un exudado o trasudado?',options:['Trasudado (Criterios Light negativos)','Exudado','No se puede determinar','Mixto'],correct:0,explain:'Criterios Light: Prot pleural/sérica >0.5, LDH pleural/sérica >0.6, o LDH pleural >2/3 límite superior. Si ninguno positivo: trasudado. Causa más frecuente: ICC. Tratamiento: diuréticos.'},
{cat:'neumo',diff:'easy',title:'Tuberculosis pulmonar',body:'Varón 35a, tos >3 semanas, hemoptisis, sudoración nocturna, pérdida de peso. Rx: caverna en LSI. Contacto TBC reciente.',question:'¿Tratamiento estándar?',options:['RIPE: Rifampicina+Isoniazida+Pirazinamida+Etambutol 2m, luego RI 4m','Isoniazida 9 meses solo','Levofloxacino 6 meses','Amoxicilina 3 semanas'],correct:0,explain:'TBC pulmonar: pauta RIPE 2 meses (fase intensiva) + RI 4 meses (fase mantenimiento). Total 6 meses. Aislamiento respiratorio hasta 3 baciloscopias negativas.'},
{cat:'neumo',diff:'med',title:'Asma: clasificación',body:'Mujer 25a, síntomas asmáticos 3 veces/semana, despertares nocturnos 2 veces/mes, FEV1 82%.',question:'¿Escalón de tratamiento?',options:['Escalón 2: CI dosis baja + SABA rescate','Escalón 1: solo SABA a demanda','Escalón 3: CI dosis media + LABA','Escalón 4: CI dosis alta + LABA'],correct:0,explain:'Asma persistente leve (síntomas >2/sem, nocturnos >2/mes): Escalón 2 GINA → Corticoide inhalado dosis baja diario + SABA rescate. Alternativa: CI-formoterol a demanda.'},
{cat:'neumo',diff:'hard',title:'SAHS grave',body:'Varón 55a obeso, ronquidos, somnolencia diurna excesiva (Epworth 18), apneas presenciadas. IAH=45 (polisomnografía).',question:'¿Tratamiento de elección?',options:['CPAP nocturna','Pérdida de peso sola','DAM (dispositivo avance mandibular)','Uvulopalatofaringoplastia'],correct:0,explain:'SAHS grave (IAH>30) con somnolencia: CPAP nocturna es el tratamiento de elección. La pérdida de peso es complementaria. DAM para SAHS leve-moderado o intolerancia a CPAP.'},

// ═══ NEUROLOGÍA (15) ═══
{cat:'neuro',diff:'med',title:'Ictus isquémico agudo',body:'Mujer 68a, HTA. Hemiparesia derecha y afasia de 2h evolución. NIHSS 14.',question:'¿Siguiente paso?',options:['TC craneal SIN contraste','Anticoagulación con heparina','RM cerebral','Bajar TA a <140/90'],correct:0,explain:'Ictus agudo: TC sin contraste para descartar hemorragia. Si isquémico <4.5h: fibrinolisis IV (alteplasa). TA solo bajar si >185/110 pre-fibrinolisis.'},
{cat:'neuro',diff:'easy',title:'Meningitis bacteriana',body:'Varón 20a, fiebre 40°C, cefalea intensa, rigidez de nuca, petequias. Kernig y Brudzinski positivos.',question:'¿Primera medida?',options:['Dexametasona IV + Ceftriaxona IV inmediata','Punción lumbar antes de todo','TC craneal previo a PL','Hemocultivos y esperar resultados'],correct:0,explain:'Meningitis bacteriana sospechada: NO retrasar ATB. Dexametasona 10mg IV (antes o junto al ATB) + Ceftriaxona 2g/12h IV. PL después si no hay CI. Petequias sugieren N. meningitidis.'},
{cat:'neuro',diff:'hard',title:'Status epiléptico',body:'Mujer 35a epiléptica. Crisis tónico-clónica generalizada >10 min continua. No cede.',question:'¿Secuencia de tratamiento?',options:['1º BZD (Diazepam IV) → 2º Levetiracetam/Fenitoína → 3º Anestésicos','1º Fenitoína → 2º BZD','Fenobarbital de entrada','Carbamazepina IV'],correct:0,explain:'Status: 1º BZD (Diazepam 10mg IV o Midazolam IM) → si no cede en 5 min: 2º antiepiléptico IV (Levetiracetam, Valproico o Fenitoína) → 3º status refractario: Propofol/Midazolam en UCI.'},
{cat:'neuro',diff:'easy',title:'Cefalea en trueno',body:'Mujer 50a, cefalea brusca "la peor de mi vida", rigidez de nuca, sin fiebre.',question:'¿Primera sospecha?',options:['Hemorragia subaracnoidea','Migraña con aura','Cefalea tensional','Arteritis de la temporal'],correct:0,explain:'Cefalea en trueno (thunderclap headache): HSA hasta que se demuestre lo contrario. TC craneal urgente. Si TC normal pero alta sospecha: PL (xantocromía). AngioTC para detectar aneurisma.'},
{cat:'neuro',diff:'med',title:'Esclerosis múltiple',body:'Mujer 28a, neuritis óptica hace 1 año. Ahora debilidad MMII progresiva + parestesias. RM: lesiones periventriculares en T2.',question:'¿Tratamiento del brote agudo?',options:['Metilprednisolona IV 1g/3-5 días','Interferón beta','Natalizumab','Ciclofosfamida'],correct:0,explain:'Brote de EM: Metilprednisolona IV 1g/día x 3-5 días. Acorta la duración del brote pero no modifica el pronóstico a largo plazo. El tratamiento modificador (IFN, Natalizumab) es para prevenir brotes.'},
{cat:'neuro',diff:'hard',title:'Miastenia gravis - crisis',body:'Mujer 40a, miastenia gravis conocida. Disnea progresiva, disfagia, CVF 800ml. No puede mantener cabeza erguida.',question:'¿Tratamiento urgente?',options:['Plasmaféresis o IgIV + IOT si CVF<1L','Aumentar Piridostigmina','Timectomía urgente','Corticoides IV solos'],correct:0,explain:'Crisis miasténica (CVF<15ml/kg): IOT electiva si deterioro. Plasmaféresis o IgIV son igualmente eficaces y actúan en días. Corticoides pueden empeorar inicialmente. Timectomía es electiva.'},
{cat:'neuro',diff:'easy',title:'Parkinson',body:'Varón 65a, temblor de reposo en mano derecha ("pill-rolling"), rigidez, bradicinesia, marcha festinante.',question:'¿Tratamiento de primera línea?',options:['Levodopa/Carbidopa','Anticolinérgicos','Amantadina','Selegilina'],correct:0,explain:'Parkinson con síntomas que afectan calidad de vida: Levodopa/Carbidopa es el fármaco más eficaz. En jóvenes (<65a) puede iniciarse con agonistas dopaminérgicos para retrasar discinesias.'},
{cat:'neuro',diff:'med',title:'Síndrome de Guillain-Barré',body:'Varón 30a, debilidad ascendente simétrica tras GEA hace 2 semanas. Arreflexia. LCR: disociación albúmino-citológica.',question:'¿Tratamiento?',options:['IgIV o Plasmaféresis','Corticoides IV','Antibióticos','Fisioterapia solo'],correct:0,explain:'GBS: IgIV (0.4g/kg/5d) o Plasmaféresis son igualmente eficaces. Los corticoides NO son eficaces. Monitorizar función respiratoria (CVF) por riesgo de insuficiencia respiratoria.'},
{cat:'neuro',diff:'easy',title:'Vértigo periférico',body:'Mujer 55a, vértigo rotatorio brusco con náuseas, nistagmo horizonto-rotatorio que se fatiga. Sin focalidad neurológica.',question:'¿Diagnóstico más probable?',options:['Vértigo posicional paroxístico benigno','Ictus cerebeloso','Neurinoma del acústico','Enfermedad de Ménière'],correct:0,explain:'VPPB: vértigo breve con cambios posturales, nistagmo fatigable, sin hipoacusia. Diagnóstico: maniobra Dix-Hallpike. Tratamiento: maniobras de reposición (Epley).'},
{cat:'neuro',diff:'hard',title:'Hipertensión intracraneal',body:'Varón 60a, cefalea progresiva matutina, vómitos en escopetazo, papiledema bilateral. TC: masa frontal con edema.',question:'¿Medida urgente?',options:['Dexametasona IV + Manitol','Punción lumbar evacuadora','Ventriculostomía inmediata','Solo analgesia y observar'],correct:0,explain:'HTIC por masa con edema: Dexametasona IV 10mg bolo + 4mg/6h (reduce edema vasogénico) + Manitol 20% si herniación inminente. PL CONTRAINDICADA. Valorar cirugía.'},
{cat:'neuro',diff:'med',title:'Epilepsia: primer episodio',body:'Varón 25a, primera crisis tónico-clónica generalizada. Sin fiebre, sin tóxicos. Postcrítico 20 min. TC y EEG normales.',question:'¿Se inicia tratamiento antiepiléptico?',options:['No, tras primera crisis aislada no se trata','Sí, Levetiracetam de por vida','Sí, Valproico 6 meses','Fenitoína profiláctica'],correct:0,explain:'Primera crisis no provocada aislada: NO se inicia FAE (riesgo recurrencia ~40%). Se trata tras 2ª crisis o si alto riesgo (EEG patológico, lesión estructural). Si se trata: Levetiracetam o Lamotrigina.'},
{cat:'neuro',diff:'easy',title:'Neuralgia del trigémino',body:'Mujer 60a, dolor lancinante paroxístico en hemicara derecha (V2-V3), dura segundos, se desencadena al masticar.',question:'¿Fármaco de primera línea?',options:['Carbamazepina','Amitriptilina','Gabapentina','Tramadol'],correct:0,explain:'Neuralgia trigémino: Carbamazepina (u Oxcarbazepina) es primera línea. Inicio 200mg/12h, titular. Si refractaria: cirugía (descompresión microvascular, radiocirugía).'},
{cat:'neuro',diff:'med',title:'AIT carotídeo',body:'Varón 70a, episodio de amaurosis fugaz OD + hemiparesia izquierda transitoria (30 min). Eco-doppler: estenosis carotídea derecha 80%.',question:'¿Actitud?',options:['Endarterectomía carotídea (CEA) precoz','Anticoagulación crónica','Solo antiagregación','Stent carotídeo'],correct:0,explain:'AIT/ictus menor + estenosis carotídea sintomática >70%: endarterectomía precoz (<2 semanas) reduce riesgo de ictus. CEA preferible sobre stent en la mayoría de pacientes. Añadir estatina + antiagregante.'},
{cat:'neuro',diff:'hard',title:'Encefalitis herpética',body:'Mujer 35a, fiebre, confusión, crisis parciales complejas, alteración de conducta. RM: hiperintensidad temporal medial bilateral.',question:'¿Tratamiento inmediato?',options:['Aciclovir IV 10mg/kg/8h sin esperar PCR','Antibióticos empíricos solo','Corticoides IV','Antiepilépticos solo'],correct:0,explain:'Encefalitis herpética: iniciar Aciclovir IV 10mg/kg/8h INMEDIATAMENTE ante sospecha, sin esperar PCR del LCR. El retraso aumenta mortalidad. Duración: 14-21 días. La PCR VHS en LCR confirma.'},

// ═══ DIGESTIVO (15) ═══
{cat:'digest',diff:'easy',title:'Apendicitis aguda',body:'Varón 25a, dolor periumbilical migrado a FID, 12h evolución. Anorexia, náuseas. McBurney+, Blumberg+.',question:'¿Diagnóstico más probable?',options:['Apendicitis aguda','Adenitis mesentérica','Cólico renal derecho','Diverticulitis'],correct:0,explain:'Dolor periumbilical migrado a FID + irritación peritoneal = apendicitis. Confirmar con eco/TC. Cirugía urgente.'},
{cat:'digest',diff:'med',title:'HDA varicosa',body:'Varón 60a, cirrosis Child B, AINEs. Hematemesis roja x2, palidez, FC 120, TAS 85.',question:'¿Primera medida?',options:['Reposición volumen (2 vías gruesas + cristaloides)','Endoscopia inmediata','Somatostatina IV','SNG para lavado'],correct:0,explain:'HDA con inestabilidad: ABCDE. Reposición volumen primero. En cirrótico: Terlipresina/Octreótido + ATB profilaxis + IPP IV. Endoscopia en <12h tras estabilización.'},
{cat:'digest',diff:'easy',title:'ERGE',body:'Mujer 40a, pirosis ascendente postprandial, regurgitación ácida, empeora en decúbito.',question:'¿Tratamiento inicial?',options:['IBP (Omeprazol 20mg/24h) 4-8 semanas','Antiácidos a demanda','Anti-H2 (Ranitidina)','Funduplicatura de Nissen'],correct:0,explain:'ERGE típica sin signos de alarma: IBP (Omeprazol 20mg/24h) 4-8 semanas. Si recidiva: IBP mantenimiento. Endoscopia si: >55 años, disfagia, pérdida peso, anemia, no respuesta a IBP.'},
{cat:'digest',diff:'hard',title:'Pancreatitis aguda grave',body:'Varón 50a, dolor epigástrico en cinturón, vómitos. Amilasa 1200. TC: necrosis pancreática >30%. APACHE II=12.',question:'¿Manejo?',options:['UCI + fluidoterapia agresiva + nutrición enteral precoz','Cirugía inmediata','ATB profilácticos','Nutrición parenteral total'],correct:0,explain:'Pancreatitis grave: UCI + fluidoterapia agresiva (Ringer Lactato 5-10ml/kg/h primeras 24h) + nutrición enteral precoz (SNG). ATB solo si infección confirmada. Cirugía solo en necrosis infectada >4 semanas.'},
{cat:'digest',diff:'med',title:'Colecistitis aguda',body:'Mujer 55a, dolor HD postprandial 12h, fiebre 38.5°C, Murphy+. Eco: colelitiasis + engrosamiento pared vesicular + líquido perivesicular.',question:'¿Tratamiento?',options:['ATB IV + colecistectomía precoz (<72h)','Colecistectomía electiva en 6 semanas','ATB VO ambulatorio','Colecistostomía percutánea'],correct:0,explain:'Colecistitis aguda: ATB IV (Amoxicilina-Clavulánico o Piperacilina-Tazobactam) + colecistectomía laparoscópica precoz (<72h). Mejor resultados que la diferida. Colecistostomía solo en alto riesgo quirúrgico.'},
{cat:'digest',diff:'easy',title:'Úlcera péptica H.pylori',body:'Varón 45a, epigastralgia que mejora con ingesta. Endoscopia: úlcera duodenal. Test ureasa rápido positivo.',question:'¿Tratamiento erradicador?',options:['IBP + Claritromicina + Amoxicilina 14 días','IBP solo 4 semanas','Triple terapia 7 días','Bismuto + Metronidazol'],correct:0,explain:'H.pylori: triple terapia 14 días (IBP 20mg/12h + Claritromicina 500mg/12h + Amoxicilina 1g/12h). IV Maastricht/V: 14 días > 7 días. Si alergia penicilina: sustituir Amoxicilina por Metronidazol.'},
{cat:'digest',diff:'hard',title:'Hemorragia digestiva baja masiva',body:'Varón 75a, rectorragia masiva con coágulos, hipotensión. Colonoscopia: no se visualiza por sangrado activo.',question:'¿Siguiente paso?',options:['AngioTC abdominal','Repetir colonoscopia','Cirugía urgente (colectomía ciega)','Cápsula endoscópica'],correct:0,explain:'HDB masiva con colonoscopia no diagnóstica: AngioTC (detecta sangrado activo >0.5ml/min). Si positiva: embolización arterial. Cirugía solo si falla endoscopia + radiología intervencionista.'},
{cat:'digest',diff:'med',title:'Enfermedad de Crohn',body:'Mujer 25a, dolor FID, diarrea crónica, pérdida peso, fístula perianal. Ileoscopia: úlceras aftoides, empedrado. Biopsia: granulomas.',question:'¿Tratamiento para inducir remisión?',options:['Corticoides (Budesonida o Prednisona)','Mesalazina','Azatioprina','Infliximab de entrada'],correct:0,explain:'Crohn ileal leve-moderado: Budesonida 9mg/día para inducción. Moderado-grave: Prednisona. Fístula perianal compleja: anti-TNF (Infliximab) + drenaje. Azatioprina es mantenimiento, no inducción.'},
{cat:'digest',diff:'easy',title:'Obstrucción intestinal',body:'Varón 70a, cirugía abdominal previa. Dolor cólico, vómitos, distensión, ausencia de gases. Rx: niveles hidroaéreos.',question:'¿Primera medida?',options:['SNG + dieta absoluta + fluidoterapia IV','Cirugía urgente inmediata','Enema opaco','Laxantes'],correct:0,explain:'Obstrucción intestinal: medidas conservadoras inicialmente (SNG descompresiva + dieta absoluta + fluidoterapia + analgesia). Cirugía si: signos de estrangulación, no mejoría en 48-72h, obstrucción completa.'},
{cat:'digest',diff:'med',title:'Cirrosis: ascitis',body:'Varón 60a, cirrosis Child C, ascitis tensa de nueva aparición. Paracentesis: PMN 280/mm3.',question:'¿Diagnóstico y tratamiento?',options:['PBE → Ceftriaxona 2g/24h IV','Ascitis simple → diuréticos solo','Peritonitis secundaria → cirugía','Tuberculosis peritoneal'],correct:0,explain:'PMN >250/mm3 en líquido ascítico = PBE (peritonitis bacteriana espontánea). ATB: Ceftriaxona 2g/24h IV 5-7 días + albúmina IV (1.5g/kg día 1, 1g/kg día 3). Prevención secundaria: Norfloxacino.'},
{cat:'digest',diff:'hard',title:'Colitis ulcerosa grave',body:'Mujer 30a, CU conocida. Brote con >6 deposiciones sanguinolentas/día, FC>90, Hb 9, PCR 45, fiebre.',question:'¿Tratamiento del brote grave?',options:['Corticoides IV (Metilprednisolona 60mg/día)','Mesalazina VO dosis altas','Infliximab de entrada','Colectomía urgente'],correct:0,explain:'CU brote grave (Truelove-Witts): ingreso + corticoides IV 3-5 días. Si no respuesta (corticorrefractaria): rescue therapy con Infliximab o Ciclosporina. Colectomía si megacolon tóxico o fallo médico.'},
{cat:'digest',diff:'easy',title:'Diarrea aguda',body:'Mujer 25a, diarrea acuosa 3 días, sin fiebre, sin sangre, sin moco. Viaje reciente.',question:'¿Tratamiento?',options:['Rehidratación oral + dieta astringente','Ciprofloxacino empírico','Loperamida + ATB','Coprocultivo urgente + ATB'],correct:0,explain:'Diarrea aguda acuosa sin signos de alarma: rehidratación oral es suficiente. ATB empírico solo si: disentérica (fiebre+sangre), inmunodeprimido, o >7 días sin mejoría. Loperamida CI en disentería.'},
{cat:'digest',diff:'med',title:'Hepatitis B crónica',body:'Varón 40a, HBsAg+ >6 meses, HBeAg+, ADN-VHB 10^7, ALT x3 LSN, FibroScan F2.',question:'¿Indicación de tratamiento?',options:['Sí: Entecavir o Tenofovir','No, solo vigilar','Interferón pegilado','Lamivudina'],correct:0,explain:'VHB crónica con ADN-VHB alto + ALT elevada + fibrosis significativa: indicación de tratamiento. Entecavir o Tenofovir (TAF) son primera línea por alta barrera genética. Lamivudina tiene alta tasa de resistencias.'},

// ═══ NEFROLOGÍA (15) ═══
{cat:'nefro',diff:'easy',title:'Insuficiencia renal aguda prerrenal',body:'Varón 80a, deshidratado, GEA 3 días. Cr 2.8 (basal 0.9), urea 120, Na orina <20, FeNa <1%.',question:'¿Tratamiento?',options:['Fluidoterapia IV con SSF','Furosemida IV','Hemodiálisis urgente','Biopsia renal'],correct:0,explain:'IRA prerrenal (FeNa<1%, Na orina<20): reposición de volumen. La Cr debe mejorar en 24-48h. Si no mejora con volumen: descartar NTA (IRA intrínseca).'},
{cat:'nefro',diff:'med',title:'Hiperpotasemia grave',body:'Varón 70a, IRC estadio IV. K+ 7.2 mEq/L. ECG: ondas T picudas, QRS ensanchado.',question:'¿Primera medida?',options:['Gluconato cálcico IV (estabilizar membrana)','Insulina + glucosa','Resinas de intercambio (Kayexalate)','Hemodiálisis urgente'],correct:0,explain:'K>7 con cambios ECG: URGENCIA. 1º Gluconato cálcico 10% IV (protege miocardio, actúa en minutos). 2º Insulina 10UI + Glucosa 50% (baja K en 30min). 3º Salbutamol nebulizado. 4º Diálisis si refractario.'},
{cat:'nefro',diff:'hard',title:'Síndrome nefrótico',body:'Mujer 30a, edemas, proteinuria 8g/24h, hipoalbuminemia 2g/dL, hiperlipemia. Función renal normal.',question:'¿Causa más frecuente en adulto?',options:['Nefropatía membranosa','Cambios mínimos','Glomerulonefritis membranoproliferativa','Amiloidosis'],correct:0,explain:'Síndrome nefrótico en adulto: causa primaria más frecuente = nefropatía membranosa. En niños: cambios mínimos. Anti-PLA2R positivo en 70% de membranosa primaria. Descartar causas secundarias (neoplasia, LES, VHB).'},
{cat:'nefro',diff:'easy',title:'Litiasis renal',body:'Varón 40a, cólico renal derecho, eco: litiasis de 4mm en uréter distal. Sin fiebre, función renal normal.',question:'¿Manejo?',options:['Analgesia + espera expulsión espontánea','Litotricia extracorpórea urgente','Ureteroscopia urgente','Nefrostomía percutánea'],correct:0,explain:'Litiasis ureteral <5-7mm sin complicaciones: tratamiento expulsivo (AINE + Tamsulosina) con tasa de expulsión >90%. Si >10mm o complicado (infección, obstrucción bilateral, monorreno): intervención urgente.'},
{cat:'nefro',diff:'med',title:'Acidosis metabólica',body:'Mujer 50a diabética, confusa. pH 7.1, HCO3 8, pCO2 20, Na 140, Cl 100, K 5.8. Glucemia 480.',question:'¿Tipo de acidosis y anion gap?',options:['AG elevado (40): cetoacidosis diabética','AG normal: acidosis hiperclorémica','Acidosis respiratoria','Alcalosis metabólica compensada'],correct:0,explain:'AG = Na - (Cl + HCO3) = 140 - (100+8) = 32 (elevado). Causas AG elevado: MUDPILES (Metanol, Uremia, Diabética, Propilenglicol, Isoniazida, Lactato, Etilenglicol, Salicilatos). En este caso: CAD.'},
{cat:'nefro',diff:'easy',title:'ITU complicada',body:'Mujer 65a, fiebre 39°C, dolor lumbar, PPR+, leucocitosis 18000, PCR 120. Orina: piuria + bacteriuria.',question:'¿Diagnóstico y tratamiento?',options:['Pielonefritis → Ceftriaxona IV','Cistitis → Fosfomicina VO','Absceso renal → drenaje','Prostatitis → Ciprofloxacino'],correct:0,explain:'Fiebre + dolor lumbar + PPR+ = pielonefritis aguda. Si criterios de ingreso: Ceftriaxona 1-2g/24h IV. Si ambulatorio: Cefixima o Ciprofloxacino VO 10-14 días. Urocultivo previo siempre.'},
{cat:'nefro',diff:'hard',title:'Glomerulonefritis rápidamente progresiva',body:'Varón 60a, hematuria macroscópica, Cr de 1.0 a 5.0 en 2 semanas, proteinuria, HTA. ANCA positivo (anti-PR3).',question:'¿Tratamiento urgente?',options:['Metilprednisolona IV + Ciclofosfamida + Plasmaféresis','Corticoides VO solos','IECA + diuréticos','Diálisis crónica directa'],correct:0,explain:'GNRP ANCA+: emergencia nefrológica. Pulsos Metilprednisolona 500-1000mg/3d + Ciclofosfamida IV (o Rituximab) + Plasmaféresis si hemorragia alveolar o Cr>5.7. Sin tratamiento: IRC terminal en semanas.'},
{cat:'nefro',diff:'med',title:'Hiponatremia',body:'Mujer 75a, confusión. Na 118 mEq/L, osmolalidad sérica 250 mOsm/kg, osmolalidad urinaria 500.',question:'¿Velocidad de corrección?',options:['<8-10 mEq/L en 24h (riesgo mielinolisis)','Lo más rápido posible con SS hipertónico','No corregir, solo restricción hídrica','20 mEq/L en 12h'],correct:0,explain:'Hiponatremia: corrección lenta <8-10 mEq/L/24h. Si sintomática grave (convulsiones, coma): SS 3% para subir 1-2 mEq/L/h las primeras 2-3h. Corrección rápida → mielinolisis pontina central (irreversible).'},
{cat:'nefro',diff:'easy',title:'ERC: cuándo derivar a nefrología',body:'Varón 60a, DM2, HTA. Cr 1.8, FG estimado 35 ml/min. Proteinuria 500mg/día.',question:'¿Estadio ERC y actitud?',options:['Estadio 3b → derivar a Nefrología','Estadio 2 → solo control en AP','Estadio 5 → diálisis urgente','Estadio 4 → trasplante anticipado'],correct:0,explain:'FG 30-44 = estadio 3b. Derivar a Nefrología si: FG<30, proteinuria>500mg, hematuria+proteinuria, deterioro rápido (>5ml/min/año), o hiperpotasemia persistente. IECA/ARA-II + control TA <130/80.'},

var currentCases=[];var caseIndex=0;var score={correct:0,wrong:0,streak:0,maxStreak:0};
var answered=false;

// Update category counts on load
function updateCounts(){
  var diff=document.getElementById('cfgDiff').value;
  document.querySelectorAll('.cat-count').forEach(function(el){
    var cat=el.dataset.cat;
    var filtered=cat==='all'?cases:cases.filter(function(c){return c.cat===cat;});
    if(diff!=='all') filtered=filtered.filter(function(c){return c.diff===diff;});
    el.textContent=filtered.length+' preguntas';
  });
  var total=diff==='all'?cases.length:cases.filter(function(c){return c.diff===diff;}).length;
  document.getElementById('totalQCount').textContent='Banco: '+total+' preguntas MIR';
}
updateCounts();
document.getElementById('cfgDiff').addEventListener('change',updateCounts);

function startCategory(cat){
    var diff=document.getElementById('cfgDiff').value;
    var count=parseInt(document.getElementById('cfgCount').value);
    
    var pool=cat==='all'?[...cases]:cases.filter(function(c){return c.cat===cat;});
    if(diff!=='all') pool=pool.filter(function(c){return c.diff===diff;});
    
    if(pool.length===0){alert('No hay preguntas con estos filtros');return;}
    
    currentCases=shuffle(pool);
    if(count>0 && count<currentCases.length) currentCases=currentCases.slice(0,count);
    
    caseIndex=0;score={correct:0,wrong:0,streak:0,maxStreak:0};
    document.getElementById('categorySelect').style.display='none';
    document.getElementById('settingsBar').style.display='none';
    document.getElementById('caseArea').style.display='block';
    document.getElementById('finishScreen').style.display='none';
    showCase();
}

function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function showCase(){
    if(caseIndex>=currentCases.length){finishGame();return;}
    answered=false;
    var c=currentCases[caseIndex];
    var diffBadge={easy:'badge-easy',med:'badge-med',hard:'badge-hard'};
    var diffLabel={easy:'FÁCIL',med:'MEDIO',hard:'DIFÍCIL'};
    var catLabel={cardio:'Cardiología',neumo:'Neumología',neuro:'Neurología',digest:'Digestivo',nefro:'Nefrología',infec:'Infecciosas',endo:'Endocrino'};
    var h='<div class="case-card">';
    h+='<div class="case-header"><span class="badge '+diffBadge[c.diff]+'">'+diffLabel[c.diff]+'</span><h2>'+c.title+'</h2><span style="font-size:.75rem;color:#94a3b8;">'+(caseIndex+1)+'/'+currentCases.length+'</span></div>';
    h+='<div style="font-size:.72rem;color:#64748b;margin-bottom:8px;">'+( catLabel[c.cat]||c.cat)+'</div>';
    h+='<div class="case-body">'+c.body+'</div>';
    if(c.vitals){
        h+='<div class="vitals">';
        for(var k in c.vitals) h+='<div class="vital"><div class="val">'+c.vitals[k]+'</div><div class="name">'+k+'</div></div>';
        h+='</div>';
    }
    h+='<h3 style="font-size:.92rem;margin:14px 0 10px;color:#60a5fa;">❓ '+c.question+'</h3>';
    h+='<div class="options">';
    var letters='ABCD';
    c.options.forEach(function(opt,i){
        h+='<div class="option" onclick="answer('+i+','+c.correct+')" id="opt'+i+'">';
        h+='<div class="letter">'+letters[i]+'</div><span>'+opt+'</span></div>';
    });
    h+='</div>';
    h+='<div class="explanation" id="explanation">💡 '+c.explain+'</div>';
    h+='<button class="btn-next" id="btnNext" onclick="nextCase()">Siguiente →</button>';
    h+='</div>';
    document.getElementById('caseArea').innerHTML=h;
    updateScore();
    document.getElementById('progressBar').style.width=((caseIndex/currentCases.length)*100)+'%';
}

function answer(selected,correct){
    if(answered)return;
    answered=true;
    document.querySelectorAll('.option').forEach(function(o){o.classList.add('disabled');});
    document.getElementById('opt'+correct).classList.add('correct');
    if(selected===correct){
        score.correct++;score.streak++;
        if(score.streak>score.maxStreak)score.maxStreak=score.streak;
    } else {
        document.getElementById('opt'+selected).classList.add('wrong');
        score.wrong++;score.streak=0;
    }
    document.getElementById('explanation').classList.add('show');
    document.getElementById('btnNext').classList.add('show');
    updateScore();
}

function nextCase(){caseIndex++;showCase();}

function updateScore(){
    document.getElementById('scoreCorrect').textContent=score.correct;
    document.getElementById('scoreWrong').textContent=score.wrong;
    document.getElementById('scoreTotal').textContent=score.correct+score.wrong;
    document.getElementById('scoreStreak').textContent=score.streak;
    var total=score.correct+score.wrong;
    document.getElementById('scorePct').textContent=total>0?Math.round((score.correct/total)*100)+'%':'-';
}

function finishGame(){
    document.getElementById('caseArea').style.display='none';
    document.getElementById('finishScreen').style.display='block';
    var pct=Math.round((score.correct/(score.correct+score.wrong))*100);
    var emoji=pct>=80?'🌟':pct>=60?'👍':pct>=40?'📚':'💪';
    document.getElementById('finishMsg').innerHTML=emoji+' Aciertos: <strong style="color:#22c55e;">'+score.correct+'</strong> / '+(score.correct+score.wrong)+' ('+pct+'%)<br>Mejor racha: '+score.maxStreak;
    document.getElementById('progressBar').style.width='100%';
    // Save stats
    try{
      var stats=JSON.parse(localStorage.getItem('mir_stats')||'{}');
      stats.totalSessions=(stats.totalSessions||0)+1;
      stats.totalCorrect=(stats.totalCorrect||0)+score.correct;
      stats.totalWrong=(stats.totalWrong||0)+score.wrong;
      stats.bestPct=Math.max(stats.bestPct||0,pct);
      localStorage.setItem('mir_stats',JSON.stringify(stats));
    }catch(e){}
}

function resetGame(){
    document.getElementById('categorySelect').style.display='block';
    document.getElementById('settingsBar').style.display='block';
    document.getElementById('finishScreen').style.display='none';
    document.getElementById('caseArea').style.display='none';
    score={correct:0,wrong:0,streak:0,maxStreak:0};updateScore();
    document.getElementById('progressBar').style.width='0%';
    updateCounts();
}
</script>
