name: E2E + a11y

on:
  pull_request:
    branches: [main]
    paths:
      - '*.html'
      - '*.js'
      - '*.css'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke + a11y · Chromium
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
      - name: Smoke tests (gating)
        run: npx playwright test e2e/smoke.spec.ts --project=chromium-desktop
      - name: Accessibility audit (informativo, no gating todavia)
        if: always()
        continue-on-error: true
        run: npx playwright test e2e/a11y.spec.ts --project=chromium-desktop
        env:
          E2E_BASE_URL: https://area2cartagena.es
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
