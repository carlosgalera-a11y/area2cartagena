name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  functions:
    name: Functions · typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
      - name: Install
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test

  secret-scan:
    name: Secret scan · gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

  html-validate:
    name: HTML · structural validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: html-validate (warn only)
        run: |
          npx --yes html-validate@latest --formatter=text index.html status.html offline.html privacidad.html || true
